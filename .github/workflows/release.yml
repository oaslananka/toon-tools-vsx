name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release-please:
    name: Release Please
    if: ${{ github.repository == 'oaslananka/toon-tools-vsx' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      # Required for release-please to create release commits, tags, and GitHub Releases.
      contents: write
      # Required for release-please to open and update release pull requests.
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  package-and-publish:
    name: Package and Publish
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: marketplace
    permissions:
      # Required by actions/attest-build-provenance to write build attestations.
      attestations: write
      # Required to upload generated release assets to the GitHub Release.
      contents: write
      # Required by actions/attest-build-provenance for OIDC-backed provenance.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release validation
        run: xvfb-run -a pnpm run check:ci

      - name: Validate registry target versions
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: pnpm run check:publish-targets -- "$RELEASE_VERSION"

      - name: Generate SBOM
        env:
          SYFT_VERSION: '1.44.0'
          SOURCE_NAME: ${{ github.repository }}
          SOURCE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          curl -sSfL -o syft.tar.gz "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -sSfL -o syft_checksums.txt "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt"
          grep " syft_${SYFT_VERSION}_linux_amd64.tar.gz$" syft_checksums.txt | sha256sum -c -
          tar -xzf syft.tar.gz syft
          ./syft scan dir:. --exclude './node_modules/**' --source-name "$SOURCE_NAME" --source-version "$SOURCE_VERSION" -o cyclonedx-json=sbom.cdx.json

      - name: Generate checksums
        run: |
          vsix="$(find . -maxdepth 1 -type f -name '*.vsix' -print -quit)"
          test -n "$vsix"
          sha256sum "$vsix" sbom.cdx.json > checksums.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            *.vsix
            sbom.cdx.json
            checksums.sha256

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$RELEASE_TAG" ./*.vsix sbom.cdx.json checksums.sha256 --repo "$GITHUB_REPOSITORY"
