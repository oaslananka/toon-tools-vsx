name: Gitleaks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  gitleaks:
    name: Gitleaks
    if: ${{ github.repository == 'oaslananka/toon-tools-vsx' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL -o "$asset" "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${asset}"
          curl -sSfL -o gitleaks_checksums.txt "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " ${asset}$" gitleaks_checksums.txt | sha256sum -c -
          tar -xzf "$asset" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --verbose
