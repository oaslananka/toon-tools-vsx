name: TOON Tools CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI (${{ matrix.check-name }})
    if: ${{ github.repository == 'oaslananka/toon-tools-vsx' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            check-name: ubuntu-24.04
          - os: windows-2025-vs2026
            check-name: windows-2025
          - os: macos-15
            check-name: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.ignore-scripts=true

      - name: Run CI (Linux with xvfb)
        if: ${{ runner.os == 'Linux' }}
        run: xvfb-run -a pnpm run check:ci

      - name: Run CI (non-Linux)
        if: ${{ runner.os != 'Linux' }}
        run: pnpm run check:ci

      - name: Run mutation tests
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: pnpm run test:mutation

      - name: Validate VSIX contents
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: pnpm exec vsce ls --tree

      - name: Upload VSIX artifact
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: toon-tools-vsx-vsix
          path: '*.vsix'
          if-no-files-found: error
