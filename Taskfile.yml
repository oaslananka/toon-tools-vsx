version: '3'

tasks:
  install:
    desc: Deterministic dependency install
    cmds: [pnpm install --frozen-lockfile]

  format:check:
    desc: Check formatting
    cmds: [pnpm run format:check]

  format:
    desc: Format source files
    cmds: [pnpm run format]

  format:fix:
    desc: Auto-fix formatting
    cmds:
      - task: format

  lint:
    desc: ESLint + format check
    cmds:
      - task: format:check
      - pnpm run lint

  typecheck:
    desc: TypeScript type-check
    cmds: [pnpm run typecheck]

  test:unit:
    desc: Run unit tests
    cmds: [pnpm run test:unit]

  test:unit:coverage:
    desc: Unit tests with coverage
    cmds: [pnpm run test:unit:coverage]

  test:integration:
    desc: VS Code integration tests
    cmds: [pnpm run test:integration]

  test:
    desc: Run unit and integration tests
    cmds:
      - task: test:unit
      - task: test:integration

  build:
    desc: Production webpack build
    cmds: [pnpm run build]

  package:
    desc: Package VSIX
    cmds: [pnpm run package]

  audit:ci:
    desc: Security audit (high+)
    cmds: [pnpm run audit:ci]

  pre-push:
    desc: Local pre-push gate
    cmds:
      - task: lint
      - task: typecheck
      - task: test:unit
      - task: audit:ci

  ci:
    desc: Full CI pipeline
    cmds: [pnpm run check:ci]

  release:
    desc: Build and validate a release-ready VSIX
    cmds:
      - task: ci
      - pnpm exec vsce ls --tree --no-dependencies
